name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'ksef_master_backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ksef_master_backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ksef_master_backend

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ksef_master_backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (${{ env.CONFIGURATION }})
        run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }} -warnaserror

      - name: Run tests
        run: |
          if ls **/*Tests.csproj **/*Test.csproj 1>/dev/null 2>&1; then
            dotnet test --no-build --configuration ${{ env.CONFIGURATION }} \
              --logger "trx;LogFileName=test-results.trx" \
              --collect:"XPlat Code Coverage" \
              --results-directory ./TestResults
          else
            echo "No test projects found — skipping dotnet test."
          fi

      - name: Upload test results
        if: always() && hashFiles('ksef_master_backend/TestResults/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ github.sha }}
          path: ksef_master_backend/TestResults
          retention-days: 7

  publish:
    name: Publish
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('ksef_master_backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish (${{ env.CONFIGURATION }})
        run: dotnet publish --configuration ${{ env.CONFIGURATION }} --output ./publish /p:UseAppHost=false

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish-${{ github.sha }}
          path: ksef_master_backend/publish
          retention-days: 7
          if-no-files-found: error

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: List vulnerable packages
        run: dotnet list package --vulnerable --include-transitive
