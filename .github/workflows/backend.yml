name: Backend CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ksef_master_backend

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build (${{ env.CONFIGURATION }})
        run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }} -warnaserror

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore KSeF_Master.slnx

      - name: Build solution (${{ env.CONFIGURATION }})
        run: dotnet build KSeF_Master.slnx --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run tests
        run: |
          dotnet test KSeF_Master.slnx \
            --no-build \
            --configuration ${{ env.CONFIGURATION }} \
            --logger "trx;LogFileName=results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --verbosity normal

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend test results
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 14

  publish:
    name: Publish artifact
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish
        run: dotnet publish --configuration ${{ env.CONFIGURATION }} --output ./publish /p:UseAppHost=false

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish-${{ github.sha }}
          path: ksef_master_backend/publish
          retention-days: 7
          if-no-files-found: error

  audit:
    name: Vulnerable packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: List vulnerable packages
        run: dotnet list package --vulnerable --include-transitive
